name: BrandProposAI CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Проверить импорт приложения
        run: |
          python -c "from main import app; print('FastAPI + Flask integration OK')"

      - name: Проверить список маршрутов
        run: |
          python - <<'PY'
          from main import app
          routes = [getattr(route, "path", "") for route in app.routes]
          print(routes)
          assert "/gamification" in routes or any(r.startswith("/gamification") for r in routes)
          PY

      - name: Собрать архив проекта
        run: |
          zip -r brandproposai_project.zip . \
            -x "venv/*" \
            -x ".git/*" \
            -x "__pycache__/*" \
            -x "*.pyc"

      - name: Сохранить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: brandproposai_project
          path: brandproposai_project.zip