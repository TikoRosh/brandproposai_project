<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandProposAI RU — документ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%); min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        .watermark { position: fixed; bottom: 20px; right: 20px; width: 120px; opacity: .12; z-index: 0; pointer-events: none; user-select: none; }
        header { background: rgba(255,255,255,.95); backdrop-filter: blur(10px); padding: 1.2rem 0; box-shadow: 0 2px 20px rgba(0,0,0,.1); position: relative; z-index: 2; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo-section { display: flex; align-items: center; gap: 1rem; }
        .logo-img { width: 45px; height: 45px; object-fit: contain; border-radius: 10px; }
        .logo-text { font-size: 1.4rem; font-weight: 700; color: #e74c3c; }
        .logo-subtext { font-size: .85rem; color: #999; margin-left: .3rem; }
        .nav-button { background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%); color: white; border: none; padding: .9rem 2rem; border-radius: 25px; font-weight: 600; cursor: pointer; transition: all .3s ease; box-shadow: 0 4px 15px rgba(231,76,60,.3); }
        .nav-button:hover { transform: translateY(-2px); }
        main { flex: 1; padding: 2rem; position: relative; z-index: 1; }
        .container { max-width: 1000px; margin: 0 auto; }
        .success-card, .form-section, .document-section { background: rgba(255,255,255,.98); border-radius: 20px; padding: 2.5rem; margin-bottom: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,.15); }
        .success-card { text-align: center; }
        .success-icon { width: 70px; height: 70px; background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
        .success-icon::after { content: '✓'; color: white; font-size: 2.5rem; font-weight: bold; }
        .success-card h1 { color: #1a202c; margin-bottom: .5rem; font-size: 1.9rem; }
        .success-card p { color: #718096; }
        .section-title { font-size: 1.3rem; color: #1a202c; margin-bottom: 1.5rem; font-weight: 700; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: .6rem; color: #4a5568; font-weight: 600; font-size: .95rem; }
        input[type="text"], textarea { width: 100%; padding: 1rem 1.2rem; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; font-family: inherit; transition: all .3s ease; background: #f7fafc; }
        input[type="text"]:focus, textarea:focus { outline: none; border-color: #e74c3c; background: white; box-shadow: 0 0 0 4px rgba(231,76,60,.15); }
        textarea { min-height: 120px; resize: vertical; line-height: 1.6; }
        .generate-btn { width: 100%; padding: 1.2rem; background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%); color: white; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all .3s ease; box-shadow: 0 4px 15px rgba(231,76,60,.4); }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(231,76,60,.55); }
        .document-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #e2e8f0; gap: 1rem; }
        .document-title { font-size: 1.25rem; color: #1a202c; font-weight: 700; }
        .edit-badge { background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%); color: white; padding: .4rem 1rem; border-radius: 20px; font-size: .85rem; font-weight: 600; }
        .document-content { background: white; border-radius: 12px; padding: 2.5rem; min-height: 500px; box-shadow: 0 2px 10px rgba(0,0,0,.05); border: 1px solid #e2e8f0; line-height: 1.8; color: #2d3748; font-size: 1rem; outline: none; }
        .document-content:focus { border-color: #e74c3c; box-shadow: 0 0 0 4px rgba(231,76,60,.12); }
        .document-content h2 { color: #e74c3c; margin: 1.5rem 0 1rem; font-size: 1.4rem; text-align: center; text-transform: uppercase; }
        .document-content h3 { color: #c0392b; margin: 1.2rem 0 .8rem; font-size: 1.15rem; }
        .document-content p { margin-bottom: 1rem; text-align: justify; }
        .document-content ul { margin: 1rem 0; padding-left: 2rem; }
        .document-content li { margin-bottom: .5rem; }
        .save-section { margin-top: 2rem; padding-top: 2rem; border-top: 2px solid #e2e8f0; text-align: center; }
        .save-title { font-size: 1.1rem; color: #4a5568; margin-bottom: 1.2rem; font-weight: 600; }
        .save-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .save-btn { padding: 1rem 2rem; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all .3s ease; display: flex; align-items: center; gap: .6rem; font-size: 1rem; color: white; }
        .save-btn.pdf { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); box-shadow: 0 4px 15px rgba(231,76,60,.3); }
        .save-btn.docx { background: linear-gradient(135deg, #c92a2a 0%, #922b21 100%); box-shadow: 0 4px 15px rgba(201,42,42,.3); }
        .save-btn.save { background: linear-gradient(135deg, #718096 0%, #4a5568 100%); }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,.2); }
        footer { background: rgba(255,255,255,.95); padding: 1.5rem 0; text-align: center; color: #718096; margin-top: auto; position: relative; z-index: 2; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: white; padding: 1rem 2rem; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,.2); display: none; align-items: center; gap: 1rem; z-index: 1000; border-left: 4px solid #e74c3c; }
        .toast.show { display: flex; animation: slideIn .3s ease; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .header-container, .document-header { flex-direction: column; align-items: flex-start; } .success-card, .form-section, .document-section { padding: 1.5rem; } .watermark { width: 80px; bottom: 10px; right: 10px; } }
    </style>
</head>
<body>
    <img src="logo.png" alt="Watermark" class="watermark">
    <header>
        <div class="header-container">
            <div class="logo-section"><img src="logo-header.png" alt="BrandProposAI Logo" class="logo-img"><div><span class="logo-text">BrandProposAI</span><span class="logo-subtext">RU</span></div></div>
            <button class="nav-button" onclick="window.location.href='/1.html'">Новая генерация</button>
            <button class="nav-button" onclick="window.location.href='/gamification/'">
    Геймификация
</button>
        </div>
    </header>
    <main><div class="container">
        <div class="success-card"><div class="success-icon"></div><h1>Коммерческое предложение готово!</h1><p>Вы можете отредактировать документ ниже и сохранить его в удобном формате</p></div>
        <div class="form-section">
            <h2 class="section-title">Параметры генерации</h2>
            <form id="regenerateForm">
                <div class="input-group"><label for="companyName">Название компании / получателя</label><input type="text" id="companyName" placeholder="Введите название получателя"></div>
                <div class="input-group"><label for="prompt">Описание проекта / запрос</label><textarea id="prompt" placeholder="Опишите коммерческое предложение"></textarea></div>
                <button type="submit" class="generate-btn">Сгенерировать заново</button>
            </form>
        </div>
        <div class="document-section">
            <div class="document-header"><div class="document-title">Ваше коммерческое предложение</div><div class="edit-badge">✎ Редактируемый</div></div>
            <div class="document-content" id="documentContent" contenteditable="true"><h2>Коммерческое предложение</h2><p>Загрузка...</p></div>
            <div class="save-section">
                <div class="save-title">Сохранить документ как:</div>
                <div class="save-buttons">
                    <button class="save-btn save" onclick="saveEdits()"><span>💾</span><span>Сохранить правки</span></button>
                    <button class="save-btn pdf" onclick="exportFile('pdf')"><span>📄</span><span>Сохранить как PDF</span></button>
                    <button class="save-btn docx" onclick="exportFile('docx')"><span>📝</span><span>Сохранить как DOCX</span></button>
                </div>
            </div>
        </div>
    </div></main>
    <footer><p>&copy; 2026 BrandProposAI RU</p></footer>
    <div class="toast" id="toast"><span style="color:#e74c3c;font-size:1.3rem;">✓</span><span id="toastMessage">Готово</span></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        let proposalId = params.get('id') || localStorage.getItem('lastProposalId');

        function payload() {
            return {
                generation_id: proposalId,
                company_name: document.getElementById('companyName').value,
                prompt: document.getElementById('prompt').value,
                html_content: document.getElementById('documentContent').innerHTML
            };
        }

        async function loadProposal() {
            if (!proposalId) { showToast('Сначала создайте КП на первой странице'); return; }
            const response = await fetch(`/api/proposals/${proposalId}`);
            if (!response.ok) { showToast('Не удалось загрузить КП'); return; }
            const data = await response.json();
            document.getElementById('companyName').value = data.company_name || '';
            document.getElementById('prompt').value = data.prompt || '';
            document.getElementById('documentContent').innerHTML = data.html_content || '<h2>Коммерческое предложение</h2>';
        }

        document.getElementById('regenerateForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const btn = document.querySelector('.form-section .generate-btn');
            const originalText = btn.textContent;
            btn.disabled = true; btn.textContent = 'Генерация...'; btn.style.opacity = '0.7';
            try {
                const response = await fetch('/api/generate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ company_name: document.getElementById('companyName').value, prompt: document.getElementById('prompt').value }) });
                if (!response.ok) throw new Error('Ошибка генерации');
                const data = await response.json();
                proposalId = data.id; localStorage.setItem('lastProposalId', data.id);
                history.replaceState(null, '', `/2.html?id=${data.id}`);
                await loadProposal();
                showToast('Документ сгенерирован заново');
            } catch (err) { showToast(err.message || 'Ошибка генерации'); }
            finally { btn.disabled = false; btn.textContent = originalText; btn.style.opacity = '1'; }
        });

        async function saveEdits() {
            if (!proposalId) return showToast('Нет ID документа');
            const response = await fetch(`/api/proposals/${proposalId}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload()) });
            showToast(response.ok ? 'Правки сохранены' : 'Не удалось сохранить правки');
        }

        async function exportFile(type) {
            const response = await fetch(`/api/export/${type}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload()) });
            if (!response.ok) return showToast('Ошибка экспорта');
            const blob = await response.blob();
            const disposition = response.headers.get('content-disposition') || '';
            const match = disposition.match(/filename="?([^";]+)"?/);
            const filename = match ? decodeURIComponent(match[1]) : `proposal.${type}`;
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
            window.URL.revokeObjectURL(url);
            showToast(`Документ сохранен как ${type.toUpperCase()}`);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000);
        }
        loadProposal();
    </script>
</body>
</html>
